<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fast-Food Orders</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
</head>
<style>
    :root {
        color-scheme: dark;
        --bg: #0b1220;
        --surface: rgba(15, 23, 42, 0.72);
        --surface-border: rgba(148, 163, 184, 0.18);
        --text: #e2e8f0;
        --muted: #94a3b8;
        --accent: #38bdf8;
    }

    * {
        box-sizing: border-box;
    }

    body {
        margin: 0;
        min-height: 100vh;
        font-family: "Inter", system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
        color: var(--text);
        background:
            radial-gradient(circle at 15% 20%, #0f172a 0%, transparent 30%),
            radial-gradient(circle at 90% 10%, #1e293b 0%, transparent 35%),
            linear-gradient(160deg, #020617, var(--bg));
        display: grid;
        place-items: center;
        padding: 2rem;
    }

    .container {
        width: min(960px, 100%);
        border: 1px solid var(--surface-border);
        background: var(--surface);
        backdrop-filter: blur(8px);
        border-radius: 20px;
        padding: 1.5rem 1.5rem 2rem;
        box-shadow: 0 20px 60px rgba(2, 6, 23, 0.6);
    }

    .header {
        display: flex;
        align-items: baseline;
        justify-content: space-between;
        gap: 1rem;
        margin-bottom: 1.25rem;
    }

    h1 {
        margin: 0;
        font-size: clamp(1.4rem, 2.4vw, 2rem);
        letter-spacing: 0.02em;
    }

    .hint {
        margin: 0;
        color: var(--muted);
        font-size: 0.9rem;
    }

    ul {
        margin: 0;
        display: flex;
        flex-direction: row;
        list-style: none;
        flex-wrap: wrap;
        width: 100%;
        gap: 1rem;
        padding: 0;
    }

    li {
        font-size: 2rem;
        width: 62px;
        height: 62px;
        display: grid;
        place-items: center;
        border-radius: 14px;
        background: rgba(15, 23, 42, 0.85);
        border: 1px solid rgba(148, 163, 184, 0.2);
        box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.04);
        animation: fadeIn 220ms ease-out;
    }

    @keyframes fadeIn {
        from {
            transform: translateY(6px);
            opacity: 0;
        }

        to {
            transform: translateY(0);
            opacity: 1;
        }
    }
</style>
<body>

    <main class="container">
        <div class="header">
            <h1>Fast-Food Orders</h1>
            <p class="hint">Live stream from Server-Sent Events</p>
        </div>

        <ul id="orders"></ul>
    </main>

    <script>
    const eventSource = new EventSource('/orders');
    const ordersList = document.getElementById('orders');

    eventSource.addEventListener('order', event => {
        const li = document.createElement('li');
        li.textContent = event.data;
        ordersList.appendChild(li);
    });

    eventSource.onerror = error => {
        console.error('EventSource failed:', error);
        eventSource.close();
    };
    </script>

</body>
</html>
